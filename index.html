<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div class="choices">
        <div class="choic" id="rock">
            <img src="Hand_Finger_Fist_S_Letter_S_Flat_PNG___SVG_Design_For_T-Shirts-removebg-preview.png" />
        </div>
        <div class="choic" id="paper">
            <img src="Log_In-removebg-preview.png" />
        </div>
        <div class="choic" id="scissors">
            <img src="Thumb_Draw_Birds_V_sign_Drawing_Hand__hand_drawing_effect_transparent_background_PNG_clipart-removebg-preview.png" />
        </div>
    </div>

    <div class="scor-board">
        <div class="scor">
            <p id="user-scor">0</p>
            <p>You</p>
        </div>
        <div class="scor">
            <p id="comp-scor">0</p>
            <p>Comp</p>
        </div>
    </div>

    <div class="msg-container">
        <p id="msg">Play your move</p>
    </div>
    <script src="script.js"></script>

</body>
</html>
